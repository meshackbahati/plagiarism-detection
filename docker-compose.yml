services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: plagiarism_db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=plagiarism_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  redis:
    image: redis:7-alpine
    container_name: plagiarism_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    container_name: plagiarism_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: plagiarism_frontend
    ports:
      - "80:80"
    depends_on:
      - api

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plagiarism_api
    command: /app/startup.sh api
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - minio
    env_file:
      - ./backend/.env.docker
    volumes:
      - ./backend:/app

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plagiarism_celery_worker
    command: /app/startup.sh celery -A app.core.celery.app worker -l info
    depends_on:
      - redis
      - api
    env_file:
      - ./backend/.env.docker
    volumes:
      - ./backend:/app

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plagiarism_celery_beat
    command: /app/startup.sh celery -A app.core.celery.app beat -l info
    depends_on:
      - redis
      - api
    env_file:
      - ./backend/.env.docker
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
  redis_data:
  minio_data:
